<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HubInfo SFC</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <header>

        <div>

            <h1>HubInfo SFC</h1>

            <p>SteadFast Courier Information Portal</p>

        </div>

        <div class="counter">

            <span id="totalHub">0</span>

            <small>Total Hub</small>

        </div>

    </header>


    <section class="search-section">

        <input
            type="text"
            id="searchInput"
            placeholder="Search Hub, Phone, IP..."
        >

    </section>


    <section class="tabs">

        <button class="tab active">Hub</button>

        <button class="tab">Warehouse</button>

        <button class="tab">Customer Care</button>

        <button class="tab">Executive</button>

        <button class="tab">Offline Charge</button>

    </section>


    <section id="hubContainer">

        <!-- Hub Cards এখানে দেখাবে -->

    </section>

</div>

<script src="js/app.js"></script>

</body>
</html>
